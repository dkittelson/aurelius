version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: aurelius-api
    ports:
      - "8000:8000"
    volumes:
      - ./data/processed:/app/data/processed:ro   # graphs + checkpoints
      - ./data/faiss_index:/app/data/faiss_index   # FAISS RAG store (rw)
    environment:
      DATASET: ${DATASET:-elliptic}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api/v1}
    image: aurelius-frontend
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
